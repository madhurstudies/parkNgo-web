<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - parkNgo</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 2rem;
            background: var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            color: var(--text-light);
        }
        
        /* Top Navigation Bar */
        .dash-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding: 0 1rem;
        }

        .png-logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-light);
            text-decoration: none;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: inline-block;
        }
        .png-logo span {
            color: var(--accent-cyan);
        }
        .png-logo:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-cyan);
            box-shadow: 0 5px 15px rgba(0, 243, 255, 0.2);
            transform: translateY(-2px);
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-settings {
            color: var(--text-light);
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--accent-cyan);
            border-radius: 8px;
            font-weight: 600;
            background: rgba(0, 243, 255, 0.05);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-settings:hover {
            background: var(--accent-cyan);
            color: var(--primary-color);
            box-shadow: 0 5px 15px rgba(0, 243, 255, 0.3);
            transform: translateY(-2px);
        }

        .logout-btn {
            color: var(--text-light);
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--accent-purple);
            border-radius: 8px;
            font-weight: 600;
            background: rgba(157, 78, 221, 0.1);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logout-btn:hover {
            background: var(--accent-purple);
            box-shadow: 0 5px 15px rgba(157, 78, 221, 0.3);
            color: #fff;
            transform: translateY(-2px);
        }

        /* Dashboard Header */
        .dash-header {
            text-align: center;
            margin-bottom: 3rem;
            width: 100%;
            max-width: 800px;
        }
        .dash-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .dash-header h1 span {
            color: var(--accent-cyan);
        }
        .dash-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: scale(0.9);
            transition: all 0.3s ease;
            max-width: 400px;
            width: 90%;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--text-light);
        }
        .modal-text {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn-cancel {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: var(--text-light);
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-cancel:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--text-light);
        }
        .btn-confirm {
            background: transparent;
            border: 1px solid var(--accent-purple);
            color: #fff;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-confirm:hover {
            background: var(--accent-purple);
            box-shadow: 0 5px 15px rgba(157, 78, 221, 0.3);
        }

        /* BG Glow */
        .bg-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            filter: blur(150px);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="bg-glow" style="background: var(--accent-purple); top: -10%; left: -10%; opacity: 0.2;"></div>
    <div class="bg-glow" style="background: var(--accent-cyan); bottom: -10%; right: -10%; opacity: 0.15;"></div>

    <div class="dash-nav">
        <a href="owner-dashboard.html" class="png-logo">P<span>n</span>G</a>
        <div class="nav-actions">
            <a href="owner-edit.html" class="btn-settings"><i class="fa-solid fa-gear"></i> Settings</a>
            <a href="#" class="logout-btn" onclick="openModal(event)"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </div>

    <div class="dash-header">
        <h1>Welcome back, <span id="displayEmail">Owner</span></h1>
        <p>Managing <strong id="displayParkingName" style="color: #fff;">Your Parking Space</strong></p>
    </div>

    <!-- Analytics Dashboard could go here later -->
    <div style="background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.1); padding: 3rem; border-radius: 20px; text-align: center; color: var(--text-muted); width: 100%; max-width: 800px;">
        <i class="fa-solid fa-chart-line" style="font-size: 2.5rem; margin-bottom: 1rem; color: rgba(255,255,255,0.2);"></i>
        <h2>Analytics Dashboard</h2>
        <p>Your live parking occupancy and revenue stats will appear here.</p>
    </div>

    <!-- Logout Modal -->
    <div class="modal-overlay" id="logoutModal">
        <div class="modal-content">
            <h2 class="modal-title">Confirm Logout</h2>
            <p class="modal-text">Are you sure you want to end your current session?</p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <script>
        // ==============================
        // SESSION & DATA CHECK
        // ==============================
        const currentOwnerEmail = sessionStorage.getItem('currentOwner');
        if (!currentOwnerEmail) {
            window.location.href = 'login-owner.html'; // Not logged in
        }

        const DB_KEY = 'parkNgo_owners';
        const owners = JSON.parse(localStorage.getItem(DB_KEY) || '{}');
        const ownerData = owners[currentOwnerEmail];

        if (!ownerData || !ownerData.setupComplete) {
            window.location.href = 'owner-setup.html'; // Incomplete setup
        }

        // Display Data
        document.getElementById('displayEmail').textContent = currentOwnerEmail.split('@')[0];
        if (ownerData && ownerData.settings) {
            document.getElementById('displayParkingName').textContent = ownerData.settings.parkingName;
        }

        // ==============================
        // MODAL LOGIC
        // ==============================
        function openModal(e) {
            e.preventDefault();
            document.getElementById('logoutModal').classList.add('active');
        }
        function closeModal() {
            document.getElementById('logoutModal').classList.remove('active');
        }
        function logout() {
            sessionStorage.removeItem('currentOwner');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
