<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - parkNgo</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body {
            overflow: hidden;
        }
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--primary-color);
            position: relative;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4rem;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            text-align: center;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .login-btn {
            background: transparent;
            border: 2px solid var(--accent-cyan);
            color: var(--text-light);
            padding: 1.2rem;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            background: var(--accent-cyan);
            color: var(--primary-color);
            box-shadow: 0 10px 20px rgba(0, 243, 255, 0.3);
            transform: translateY(-2px);
        }
        .login-btn-owner {
            border-color: var(--accent-purple);
        }
        .login-btn-owner:hover {
            background: var(--accent-purple);
            box-shadow: 0 10px 20px rgba(157, 78, 221, 0.3);
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="glow-circle cyan" style="position: absolute; top: 10%; left: 20%; z-index: 1;"></div>
    <div class="glow-circle" style="position: absolute; bottom: 10%; right: 20%; z-index: 1;"></div>
    
    <div class="login-wrapper">
        <div class="login-container">
            <a href="login-owner.html" class="login-btn login-btn-owner">Login as Owner</a>
            <a href="login-driver.html" class="login-btn">Login as Ola/Uber Driver</a>
        </div>
    </div>
</body>
</html>
