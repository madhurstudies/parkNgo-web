<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login - parkNgo</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--primary-color);
            position: relative;
            padding: 2rem;
            overflow: hidden;
        }
        .auth-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            z-index: 2;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text-light);
        }
        .auth-header p {
            color: var(--text-muted);
        }
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        .form-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .form-control {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-light);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .form-control::placeholder {
            color: rgba(138, 150, 179, 0.6);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
        }
        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent-purple);
            color: var(--text-light);
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.3s ease;
            margin-top: 1rem;
        }
        .auth-btn:hover {
            background: #843bba;
            transform: translateY(-2px);
        }
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--accent-cyan);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .auth-footer a:hover {
            color: white;
            text-decoration: underline;
        }
        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-light);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 3;
            transition: color 0.3s ease;
            font-weight: 600;
        }
        .back-link:hover {
            color: var(--accent-cyan);
        }
    </style>
</head>
<body>
    <div class="glow-circle" style="background: var(--accent-purple); position: absolute; top: 20%; left: 10%; z-index: 1; opacity: 0.4;"></div>
    <div class="glow-circle cyan" style="position: absolute; bottom: -20%; right: -10%; z-index: 1; opacity: 0.3;"></div>
    
    <a href="login.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to options</a>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Owner Portal</h2>
                <p>Login to access your parking analytics</p>
            </div>
            <form action="owner-dashboard.html">
                <div class="form-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" class="form-control" placeholder="Email Address" value="johndoe@gmail.com" required>
                </div>
                <div class="form-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" class="form-control" placeholder="Password" value="12345678" required>
                </div>
                <button type="submit" class="auth-btn">Sign In to Dashboard</button>
            </form>
            <div class="auth-footer">
                <p>Don't have an owner account? <a href="#">Register here</a></p>
                <p style="margin-top: 0.5rem;"><a href="#">Forgot Password?</a></p>
            </div>
        </div>
    </div>
</body>
</html>
