<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserved Booking Login - parkNgo</title>
    <meta name="description" content="Login to access the ParkNGo Reserved Booking management portal for administrative spot verification and status updates.">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent-green: #00ff88;
            --accent-green-dark: #00cc6a;
            --accent-green-glow: rgba(0, 255, 136, 0.3);
        }

        body { overflow: hidden; }

        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--primary-color);
            position: relative;
            padding: 2rem;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: drift linear infinite;
            opacity: 0;
        }

        @keyframes drift {
            0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.4; }
            100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 136, 0.15);
            padding: 3.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 460px;
            z-index: 2;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: var(--accent-green);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .auth-badge i { font-size: 0.75rem; }

        .auth-header {
            margin-bottom: 2.5rem;
        }

        .auth-header h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-light);
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .auth-header h2 span {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.4rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.5rem;
        }

        .form-group i.input-icon {
            position: absolute;
            left: 1rem;
            top: calc(50% + 10px);
            transform: translateY(-50%);
            color: rgba(138, 150, 179, 0.6);
            transition: color 0.3s ease;
        }

        .form-control {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-control::placeholder { color: rgba(138, 150, 179, 0.5); }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.12), 0 0 15px rgba(0, 255, 136, 0.1);
        }

        .form-control:focus + i.input-icon,
        .form-group:focus-within i.input-icon {
            color: var(--accent-green);
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .form-row .form-group { flex: 1; }

        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.8rem;
            font-size: 0.85rem;
        }

        .remember-row label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .remember-row input[type="checkbox"] {
            accent-color: var(--accent-green);
            width: 15px;
            height: 15px;
        }

        .remember-row a {
            color: var(--accent-green);
            text-decoration: none;
            transition: opacity 0.3s;
        }
        .remember-row a:hover { opacity: 0.7; }

        .auth-btn {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--accent-green-dark), var(--accent-green));
            color: #0b0f19;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            letter-spacing: 0.03em;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px var(--accent-green-glow);
        }

        .auth-btn:active { transform: translateY(0); }

        .auth-divider {
            text-align: center;
            margin: 1.8rem 0;
            position: relative;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .auth-divider::before, .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }
        .auth-divider::before { left: 0; }
        .auth-divider::after { right: 0; }

        .info-box {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 10px;
            padding: 0.9rem 1.2rem;
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .info-box i { color: var(--accent-green); margin-top: 1px; flex-shrink: 0; }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 3;
            transition: color 0.3s ease;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .back-link:hover { color: var(--accent-green); }

        .glow-green {
            position: absolute;
            width: 450px;
            height: 450px;
            background: var(--accent-green);
            filter: blur(160px);
            border-radius: 50%;
            opacity: 0.08;
            z-index: 0;
        }
    </style>
</head>
<body>
    <!-- Ambient glow -->
    <div class="glow-green" style="top: -10%; right: -10%;"></div>
    <div class="glow-circle" style="background: var(--accent-cyan); position: absolute; bottom: -15%; left: -10%; z-index: 1; opacity: 0.05;"></div>

    <!-- Floating particles -->
    <div class="particle" style="left: 15%; animation-duration: 8s; animation-delay: 0s;"></div>
    <div class="particle" style="left: 35%; animation-duration: 12s; animation-delay: 2s; width:3px; height:3px;"></div>
    <div class="particle" style="left: 60%; animation-duration: 9s; animation-delay: 4s;"></div>
    <div class="particle" style="left: 80%; animation-duration: 11s; animation-delay: 1s; width:2px; height:2px;"></div>
    <div class="particle" style="left: 50%; animation-duration: 14s; animation-delay: 6s;"></div>

    <a href="login.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to options</a>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-badge"><i class="fa-solid fa-shield-halved"></i> Admin / Guard Access</div>
            <div class="auth-header">
                <h2>Reserved <span>Booking</span> Portal</h2>
                <p>Verify pre-booked spots and manage real-time reservation statuses.</p>
            </div>

            <form id="reservedLoginForm" action="available-slots.html">
                <div class="form-group">
                    <label for="customerId">Customer ID</label>
                    <input type="text" id="customerId" class="form-control" placeholder="e.g. CUST-00124" value="CUST-00124" required>
                    <i class="fa-solid fa-id-card input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" value="admin1234" required>
                    <i class="fa-solid fa-lock input-icon"></i>
                </div>

                <div class="remember-row">
                    <label>
                        <input type="checkbox" checked> Keep me logged in
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">
                    <i class="fa-solid fa-square-parking"></i>
                    View Available Slots
                </button>
            </form>

            <div class="auth-divider">Secure Access Protocol</div>

            <div class="info-box">
                <i class="fa-solid fa-circle-info"></i>
                <span>This portal is restricted to authorized <strong style="color: var(--text-light);">ParkNGo staff</strong>. Unauthorized access attempts are logged and monitored.</span>
            </div>
        </div>
    </div>

    <script>
        // Subtle login animation feedback
        document.getElementById('reservedLoginForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';
            btn.style.opacity = '0.8';
        });
    </script>
</body>
</html>
